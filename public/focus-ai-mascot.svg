<svg width="100" height="125" viewBox="0 0 100 125" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main body gradient - Purple to Blue -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Head gradient - Lighter purple-blue -->
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    
    <!-- Accent gradient - Bright blue-purple -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    
    <!-- Shadow gradient for depth -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.5" />
    </linearGradient>
    
    <!-- Glow effect -->
    <radialGradient id="glowGradient" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Head - Rounded rectangle with modern proportions -->
  <rect x="20" y="8" width="60" height="50" rx="12" fill="url(#headGradient)" stroke="url(#accentGradient)" stroke-width="1.5" />
  
  <!-- Head highlight/shine -->
  <rect x="22" y="10" width="56" height="20" rx="10" fill="url(#glowGradient)" opacity="0.6" />

  <!-- Eyes - Modern, expressive, larger -->
  <!-- Left eye -->
  <ellipse cx="38" cy="32" rx="7" ry="9" fill="#ffffff" />
  <ellipse cx="38" cy="32" rx="5" ry="7" fill="url(#bodyGradient)" />
  <circle cx="37" cy="30" r="2.5" fill="#1e1b4b" />
  <circle cx="36.5" cy="29" r="1.5" fill="#ffffff" opacity="0.9" />
  
  <!-- Right eye -->
  <ellipse cx="62" cy="32" rx="7" ry="9" fill="#ffffff" />
  <ellipse cx="62" cy="32" rx="5" ry="7" fill="url(#bodyGradient)" />
  <circle cx="63" cy="30" r="2.5" fill="#1e1b4b" />
  <circle cx="63.5" cy="29" r="1.5" fill="#ffffff" opacity="0.9" />

  <!-- Smile expression - Subtle, professional -->
  <path d="M 32 50 Q 50 54 68 50" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9" />

  <!-- Head accent lines - Modern robotic detail -->
  <line x1="30" y1="20" x2="70" y2="20" stroke="url(#accentGradient)" stroke-width="1" opacity="0.6" />
  <line x1="28" y1="25" x2="72" y2="25" stroke="url(#accentGradient)" stroke-width="0.8" opacity="0.4" />

  <!-- Body - Sleek rounded rectangle -->
  <rect x="15" y="58" width="70" height="55" rx="14" fill="url(#bodyGradient)" stroke="url(#accentGradient)" stroke-width="1.5" />
  
  <!-- Body shadow for depth -->
  <rect x="15" y="58" width="70" height="55" rx="14" fill="url(#shadowGradient)" opacity="0.3" />

  <!-- Chest panel - Where FocusAI text goes -->
  <rect x="25" y="70" width="50" height="25" rx="6" fill="url(#accentGradient)" opacity="0.3" />
  
  <!-- Chest panel border -->
  <rect x="25" y="70" width="50" height="25" rx="6" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.6" />

  <!-- FocusAI Text on Chest -->
  <text x="50" y="87" text-anchor="middle" fill="white" font-size="5" font-weight="600" letter-spacing="0.5" style="text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);">FocusAI</text>

  <!-- Modern robotic details - Side panels -->
  <rect x="18" y="65" width="3" height="12" rx="1.5" fill="url(#accentGradient)" opacity="0.7" />
  <rect x="79" y="65" width="3" height="12" rx="1.5" fill="url(#accentGradient)" opacity="0.7" />
  
  <!-- Status indicator lights -->
  <circle cx="28" cy="102" r="2" fill="#60a5fa" opacity="0.8" />
  <circle cx="72" cy="102" r="2" fill="#a78bfa" opacity="0.8" />

  <!-- Base/Stand - Modern rounded platform -->
  <ellipse cx="50" cy="118" rx="32" ry="6" fill="url(#bodyGradient)" opacity="0.8" />
  <ellipse cx="50" cy="118" rx="32" ry="6" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.6" />

  <!-- Decorative accent dots - Subtle, professional -->
  <circle cx="35" cy="80" r="1.5" fill="#ffffff" opacity="0.5" />
  <circle cx="65" cy="80" r="1.5" fill="#ffffff" opacity="0.5" />
</svg>
